set -g allow-passthrough on
set -g set-clipboard on

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Undercurl
set -g default-terminal tmux-256color
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

set-option -g status-position top

# action key
unbind C-b
set -g prefix C-a
# 双击 C-a 发送真正的 C-a 给应用（恢复 shell 行首功能）
bind C-a send-prefix

# default shell
set -g default-shell "$SHELL"
set -s escape-time 0

set -s extended-keys on

set -g xterm-keys on
set -sg repeat-time 300
set -s focus-events on
set -g mouse on
set -sg exit-empty on

set -g history-limit 10000

# bind t send-key C-t
# Reload settings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# display
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

set -g display-panes-time 2000
set -g display-time 2000

set -g status-interval 1

# 判断当前 pane 是否运行 vim/nvim/fzf，用于快捷键透传
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(g?\.?(view|n?vim?x?)(-wrapped)?(diff)?|fzf)'"

# window management
# C-w 在 vim/nvim/fzf 内透传（保留 nvim 的窗口命令），否则新建窗口
bind -n C-w if-shell "$is_vim" 'send-keys C-w' 'new-window -c "#{pane_current_path}"'
# break pane to window
bind -n M-b break-pane
# close self pane
bind -n M-c kill-pane
# close other pane（批量销毁，加确认）
bind -n M-o confirm-before -p "kill other panes? (y/n)" "kill-pane -a"
# close window（加确认，避免误触 C-q 流控键丢窗口）
bind -n C-q confirm-before -p "kill-window #W? (y/n)" kill-window
# close other window（批量销毁，加确认）
bind -n C-e confirm-before -p "kill other windows? (y/n)" "kill-window -a"
# switch to other window
bind -n M-h previous-window
bind -n M-l next-window

# rebind split window
unbind %
bind | split-window -h
unbind '"'
bind \\ split-window -v

bind W choose-tree -Z
bind H choose-tree 'move-pane -v -s "%%"'
bind V choose-tree 'move-pane -h -s "%%"'

# set -g status-keys emacs
set -g mode-keys vi

bind -n C-x copy-mode

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi h send-keys -X cursor-left
bind -T copy-mode-vi l send-keys -X cursor-right
bind -T copy-mode-vi k send-keys -X cursor-up
bind -T copy-mode-vi j send-keys -X cursor-down
bind -T copy-mode-vi e send-keys -X next-word-end
bind -T copy-mode-vi K send-keys -N 5 -X cursor-up
bind -T copy-mode-vi J send-keys -N 5 -X cursor-down
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line
bind -T copy-mode-vi Y send-keys -X copy-end-of-line
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi n send-keys -X search-again
bind -T copy-mode-vi N send-keys -X search-reverse


# Moving window
bind-key \{ swap-window -t -1 \; previous-window
bind-key \} swap-window -t +1 \; next-window

# NOTE: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# NOTE：Install plugins <C-t> + I
# List of plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

source-file ~/.config/tmux/tokyonight/tokyonight_moon.tmux

# is_vim 已在文件前部定义

#bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
#bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
#bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
#bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }

#bind-key -T copy-mode-vi 'M-h' if -F '#{pane_at_left}' '' 'select-pane -L'
#bind-key -T copy-mode-vi 'M-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
#bind-key -T copy-mode-vi 'M-k' if -F '#{pane_at_top}' '' 'select-pane -U'
#bind-key -T copy-mode-vi 'M-l' if -F '#{pane_at_right}' '' 'select-pane -R'

bind-key -r Left resize-pane -L 1
bind-key -r Down resize-pane -D 1
bind-key -r Up resize-pane -U 1
bind-key -r Right resize-pane -R 1

bind-key -r h select-pane -L
bind-key -r l select-pane -R
bind-key -r k select-pane -U
bind-key -r j select-pane -D
bind-key -r z resize-pane -Z

# bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

